<!-- GAME_NAME: Tragamonedas -->
<!-- GAME_DESC: Girá los rodillos y combiná los símbolos para ganar D$ -->
<!-- GAME_EMOJI: 🎰 -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tragamonedas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e2e8f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px; user-select: none;
    }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
    .subtitle { color: #64748b; margin-bottom: 24px; font-size: 0.88rem; }
    .balance-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 16px;
      padding: 14px 32px; text-align: center; margin-bottom: 24px;
    }
    .balance-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 3px; }
    .balance-value { font-size: 1.7rem; font-weight: 800; font-family: 'Courier New', monospace; }
    .machine {
      background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
      border: 3px solid #6366f1; border-radius: 24px; padding: 24px;
      box-shadow: 0 0 40px #6366f130, inset 0 -8px 16px rgba(0,0,0,0.3);
      margin-bottom: 20px; width: 100%; max-width: 360px;
    }
    .reels { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .reel {
      width: 90px; height: 100px; background: #0f0e1e;
      border: 2px solid #4338ca; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; overflow: hidden;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
    }
    .reel-symbol { transition: transform 0.1s; line-height: 1; }
    .reel.spinning .reel-symbol { animation: reelSpin 0.15s linear infinite; }
    @keyframes reelSpin {
      0%   { transform: translateY(0)   scale(1);   opacity: 1; }
      50%  { transform: translateY(-20px) scale(0.7); opacity: 0; }
      51%  { transform: translateY(20px)  scale(0.7); opacity: 0; }
      100% { transform: translateY(0)   scale(1);   opacity: 1; }
    }
    .win-line {
      height: 3px;
      background: linear-gradient(90deg, transparent, #fbbf24, transparent);
      margin: -12px 0 12px; border-radius: 2px; opacity: 0; transition: opacity 0.3s;
    }
    .win-line.active { opacity: 1; }
    .paytable {
      background: #0f0e1e; border-radius: 12px; padding: 12px;
      font-size: 0.75rem; color: #94a3b8;
    }
    .paytable-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .paytable-row span:last-child { color: #fbbf24; font-weight: 700; }
    .controls {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; width: 100%; max-width: 360px;
    }
    .bet-section {
      display: flex; align-items: center; gap: 10px; width: 100%;
      background: #1e293b; border-radius: 14px; padding: 12px 16px;
    }
    .bet-label { font-size: 0.8rem; color: #64748b; flex: 1; }
    .bet-presets { display: flex; gap: 6px; }
    .preset-btn {
      background: #334155; border: 1px solid #475569; border-radius: 8px;
      padding: 5px 9px; color: #94a3b8; font-size: 0.78rem;
      cursor: pointer; font-weight: 600; transition: all 0.15s;
    }
    .preset-btn.active, .preset-btn:hover { background: #6366f1; color: white; border-color: #6366f1; }
    .spin-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 16px; color: white;
      font-size: 1.2rem; font-weight: 800; cursor: pointer;
      letter-spacing: 1px; transition: all 0.15s; box-shadow: 0 4px 20px #6366f150;
    }
    .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px #6366f170; }
    .spin-btn:active:not(:disabled) { transform: scale(0.97); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-area { min-height: 48px; display: flex; align-items: center; justify-content: center; }
    .result-msg {
      padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 1rem;
      animation: pop 0.3s ease;
    }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .win     { background: #14532d; color: #4ade80; border: 1px solid #16a34a; }
    .jackpot { background: linear-gradient(135deg, #92400e, #b45309); color: #fbbf24; border: 2px solid #fbbf24; font-size: 1.2rem; }
    .lose    { background: #1e293b; color: #64748b; }
    .error-msg { color: #f87171; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>🎰 Tragamonedas</h1>
  <p class="subtitle">Combiná los símbolos y llevate el premio</p>

  <div class="balance-box">
    <div class="balance-label">Tu saldo</div>
    <div class="balance-value" id="balance">Cargando...</div>
  </div>

  <div class="machine">
    <div class="reels">
      <div class="reel" id="r0"><span class="reel-symbol" id="s0">🎰</span></div>
      <div class="reel" id="r1"><span class="reel-symbol" id="s1">🎰</span></div>
      <div class="reel" id="r2"><span class="reel-symbol" id="s2">🎰</span></div>
    </div>
    <div class="win-line" id="winLine"></div>
    <div class="paytable">
      <div class="paytable-row"><span>💎 💎 💎</span><span>×50</span></div>
      <div class="paytable-row"><span>⭐ ⭐ ⭐</span><span>×20</span></div>
      <div class="paytable-row"><span>🍒 🍒 🍒</span><span>×10</span></div>
      <div class="paytable-row"><span>🍋 🍋 🍋</span><span>×5</span></div>
      <div class="paytable-row"><span>🎲 🎲 🎲</span><span>×3</span></div>
      <div class="paytable-row"><span>Dos iguales</span><span>×1,5</span></div>
    </div>
  </div>

  <div class="controls">
    <div class="bet-section">
      <span class="bet-label">Apuesta: <b id="betDisplay">D$ 1</b></span>
      <div class="bet-presets">
        <button class="preset-btn active" onclick="selectBet(this, 1)">×1</button>
        <button class="preset-btn" onclick="selectBet(this, 5)">×5</button>
        <button class="preset-btn" onclick="selectBet(this, 10)">×10</button>
        <button class="preset-btn" onclick="selectBet(this, 50)">×50</button>
      </div>
    </div>

    <div class="result-area"><div id="resultMsg"></div></div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 GIRAR</button>
  </div>

  <script>
    // coin — read-only global injected by the bridge, always reflects server balance.
    // Use GameAPI.bet(amount, won, prize, description) to change it.

    var SYMBOLS = ['💎', '⭐', '🍒', '🍋', '🎲', '🍊', '🔔'];
    var WEIGHTS  = [2, 5, 10, 15, 20, 24, 24];
    var MULTIPLIERS = {
      '💎💎💎': 50, '⭐⭐⭐': 20, '🍒🍒🍒': 10,
      '🍋🍋🍋': 5,  '🎲🎲🎲': 3,  '🍊🍊🍊': 3, '🔔🔔🔔': 3
    };

    var bet = 1;
    var spinning = false;

    function fmt(n) { return 'D$ ' + parseFloat(n).toFixed(5).replace('.', ','); }

    function updateBalanceDisplay() {
      document.getElementById('balance').textContent = fmt(coin);
    }

    function selectBet(btn, amount) {
      bet = amount;
      document.getElementById('betDisplay').textContent = fmt(amount);
      document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    }

    function weightedRandom() {
      var total = WEIGHTS.reduce(function(a, b) { return a + b; }, 0);
      var r = Math.random() * total;
      for (var i = 0; i < SYMBOLS.length; i++) {
        r -= WEIGHTS[i];
        if (r <= 0) return SYMBOLS[i];
      }
      return SYMBOLS[SYMBOLS.length - 1];
    }

    function setSpinning(state) {
      spinning = state;
      var btn = document.getElementById('spinBtn');
      btn.disabled = state;
      btn.textContent = state ? '⏳ Girando...' : '🎰 GIRAR';
      for (var i = 0; i < 3; i++) {
        document.getElementById('r' + i).classList.toggle('spinning', state);
      }
    }

    function showResult(msg, cls) {
      var el = document.getElementById('resultMsg');
      el.className = 'result-msg ' + cls;
      el.textContent = msg;
    }

    // Initialize balance display
    GameAPI.coins.get()
      .then(function() { updateBalanceDisplay(); })
      .catch(function() { document.getElementById('balance').textContent = 'Error'; });

    async function spin() {
      if (spinning) return;
      document.getElementById('resultMsg').textContent = '';
      document.getElementById('winLine').classList.remove('active');

      if (bet > coin) {
        showResult('Saldo insuficiente', 'error-msg');
        return;
      }

      setSpinning(true);

      try {
        // 1. Animate reels (client-side — no server yet)
        await new Promise(function(r) { setTimeout(r, 600); });

        var results = [weightedRandom(), weightedRandom(), weightedRandom()];

        for (var i = 0; i < 3; i++) {
          await new Promise(function(r) { setTimeout(r, 300); });
          document.getElementById('r' + i).classList.remove('spinning');
          document.getElementById('s' + i).textContent = results[i];
        }

        await new Promise(function(r) { setTimeout(r, 200); });

        var combo = results.join('');
        var multiplier = 0;
        if (MULTIPLIERS[combo]) {
          multiplier = MULTIPLIERS[combo];
        } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
          multiplier = 1.5;
        }

        var won = multiplier > 0;
        var prize = won ? bet * multiplier : 0;

        // 2. Single atomic server call — server validates balance and updates DB
        await GameAPI.bet(bet, won, prize, 'Tragamonedas');
        updateBalanceDisplay();

        if (won) {
          document.getElementById('winLine').classList.add('active');
          var cls = multiplier >= 20 ? 'jackpot' : 'win';
          var prefix = multiplier >= 20 ? '🏆 JACKPOT! ' : '✅ ';
          showResult(prefix + 'Ganaste ' + fmt(prize) + ' (×' + multiplier + ')', cls);
        } else {
          showResult('Sin suerte esta vez 💸', 'lose');
        }
      } catch (e) {
        showResult(e.message || 'Error', 'error-msg');
      }

      setSpinning(false);
    }
  </script>
</body>
</html>
