kind = "web"
previewPath = "/"
title = "Banco D$"
version = "1.0.0"
id = "artifacts/banco-ds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21656
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/banco-ds run dev"

[services.env]
PORT = "21656"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/banco-ds", "run", "build"]
publicDir = "artifacts/banco-ds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
